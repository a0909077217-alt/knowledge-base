<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const CATEGORIES = ["投資","策略","經濟學","個人發展","科技","其他"];
const CATEGORY_COLORS = {"投資":"#3b82f6","策略":"#8b5cf6","經濟學":"#10b981","個人發展":"#f59e0b","科技":"#ef4444","其他":"#6b7280"};
const PLATFORM_META = {
  youtube:{label:"YouTube",color:"#ff0000",icon:"▶"},
  threads:{label:"Threads",color:"#000",icon:"⊕"},
  twitter:{label:"Twitter / X",color:"#1d9bf0",icon:"✕"},
  article:{label:"文章",color:"#6b7280",icon:"📄"},
};

function detectPlatform(url) {
  if (!url) return null;
  if (/youtube\.com|youtu\.be/.test(url)) return "youtube";
  if (/threads\.net/.test(url)) return "threads";
  if (/twitter\.com|x\.com/.test(url)) return "twitter";
  return "article";
}
function getYouTubeId(url) {
  const m = url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function formatDate(ts) {
  return new Date(ts).toLocaleDateString("zh-TW",{month:"short",day:"numeric"});
}
function getWeekKey(ts) {
  const d = new Date(ts);
  const diff = d.getDate()-d.getDay()+(d.getDay()===0?-6:1);
  const mon = new Date(new Date(ts).setDate(diff));
  return `${mon.getMonth()+1}/${mon.getDate()}`;
}

// ── AI Analysis ───────────────────────────────────────────────
async function runAIAnalysis(apiKey, { url, platform, rawText, title }) {
  const context = [
    url ? `來源網址：${url}` : "",
    platform ? `平台：${PLATFORM_META[platform]?.label || platform}` : "",
    title ? `標題：${title}` : "",
    rawText ? `\n內容：\n${rawText.slice(0, 6000)}` : ""
  ].filter(Boolean).join("\n");

  const prompt = `你是一位嚴謹的知識管理助手，請根據以下來源資訊，以繁體中文完成康乃爾筆記的前兩個欄位。

${context}

請以 JSON 格式回應，只回傳 JSON，不要任何其他文字：
{
  "cue": "（提示欄）列出 3-5 個閱讀/觀看這份內容時應帶著的核心問題，以及 3-5 個關鍵概念索引，用條列式",
  "notes": "（筆記欄）整理這份內容的主要論點、核心架構、重要數據或引用，用條列式，每點簡潔扼要"
}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API 錯誤 ${res.status}`);
  }
  const data = await res.json();
  const text = data.content?.[0]?.text || "";
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

// ── API Key Setup Screen ──────────────────────────────────────
function ApiKeySetup({ onSave }) {
  const [key, setKey] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);

  async function handleSave() {
    if (!key.trim().startsWith("sk-ant-")) {
      setErr("API Key 格式不正確，應以 sk-ant- 開頭。"); return;
    }
    setTesting(true); setErr("");
    try {
      await runAIAnalysis(key.trim(), { title: "測試", rawText: "這是測試內容，請回傳格式正確的 JSON。" });
      localStorage.setItem("kb_anthropic_key", key.trim());
      onSave(key.trim());
    } catch(e) {
      setErr(`驗證失敗：${e.message}`);
    }
    setTesting(false);
  }

  return (
    <div className="login-screen">
      <div className="login-box" style={{ maxWidth:420 }}>
        <div style={{ fontSize:36, marginBottom:12 }}>🤖</div>
        <div style={{ fontSize:18, fontWeight:700, marginBottom:8 }}>設定 AI 分析功能</div>
        <div style={{ fontSize:13, color:"#888", lineHeight:1.7, marginBottom:20 }}>
          AI 自動分析需要你的 Anthropic API Key。這個 Key 只會儲存在你的裝置本機，不會上傳到任何伺服器。
          <br /><br />
          前往 <a href="https://console.anthropic.com/keys" target="_blank" rel="noreferrer" style={{ color:"#6366f1" }}>console.anthropic.com/keys</a> 取得 API Key。
        </div>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..."
          style={{ width:"100%", padding:"10px 12px", borderRadius:8, border:"1px solid #e0e0e0", fontSize:13, outline:"none", marginBottom:8 }} />
        {err && <div style={{ fontSize:12, color:"#d00", marginBottom:8, textAlign:"left" }}>{err}</div>}
        <button onClick={handleSave} disabled={testing || !key.trim()} style={{
          width:"100%", padding:"10px", borderRadius:8, border:"none", background:"#111", color:"#fff",
          fontSize:14, fontWeight:600, cursor:"pointer", opacity:(testing||!key.trim())?0.5:1, marginBottom:12
        }}>
          {testing ? "驗證中…" : "儲存並啟用 AI"}
        </button>
        <button onClick={()=>onSave(null)} style={{ background:"none", border:"none", fontSize:12, color:"#aaa", cursor:"pointer" }}>
          跳過，先不使用 AI 功能
        </button>
      </div>
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────────
function LoginScreen() {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  async function handleLogin() {
    setLoading(true); setError("");
    try {
      const { auth, provider, signInWithPopup } = window.__fb;
      await signInWithPopup(auth, provider);
    } catch(e) { setError("登入失敗，請再試一次。"); setLoading(false); }
  }
  return (
    <div className="login-screen">
      <div className="login-box">
        <div style={{ fontSize:40, marginBottom:16 }}>📚</div>
        <div style={{ fontSize:22, fontWeight:700, marginBottom:8 }}>Knowledge Base</div>
        <div style={{ fontSize:13, color:"#888", lineHeight:1.6 }}>登入後，你的筆記會自動同步至雲端，任何裝置都可以存取。</div>
        {error && <div style={{ marginTop:12, fontSize:12, color:"#d00" }}>{error}</div>}
        <button className="google-btn" onClick={handleLogin} disabled={loading}>
          {loading ? <div className="spinner" /> : (
            <>
              <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              使用 Google 帳號登入
            </>
          )}
        </button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(undefined);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("kb_anthropic_key") || "");
  const [showApiSetup, setShowApiSetup] = useState(false);
  const [notes, setNotes] = useState([]);
  const [view, setView] = useState("dashboard");
  const [editingNote, setEditingNote] = useState(null);
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("全部");
  const [filterTag, setFilterTag] = useState("");
  const [filterType, setFilterType] = useState("全部");
  const [quickCapture, setQuickCapture] = useState("");
  const [quickUrl, setQuickUrl] = useState("");
  const [saving, setSaving] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const [rawText, setRawText] = useState("");
  const [showRawText, setShowRawText] = useState(false);

  useEffect(() => {
    const { auth, onAuthStateChanged } = window.__fb;
    return onAuthStateChanged(auth, u => setUser(u || null));
  }, []);

  useEffect(() => {
    if (!user) return;
    const { db, collection, query, orderBy, onSnapshot } = window.__fb;
    const q = query(collection(db, "users", user.uid, "notes"), orderBy("updatedAt", "desc"));
    return onSnapshot(q, snap => setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, [user]);

  async function saveNote(n) {
    setSaving(true);
    n.updatedAt = Date.now();
    if (!n.createdAt) n.createdAt = Date.now();
    const { db, doc, setDoc } = window.__fb;
    await setDoc(doc(db, "users", user.uid, "notes", String(n.id)), n);
    setSaving(false); setEditingNote(null); setView("library");
  }
  async function deleteNote(id) {
    if (!window.confirm("確定刪除此筆記？")) return;
    const { db, doc, deleteDoc } = window.__fb;
    await deleteDoc(doc(db, "users", user.uid, "notes", String(id)));
    setEditingNote(null); setView("library");
  }
  function handleSignOut() { const { auth, signOut } = window.__fb; signOut(auth); }

  const blankNote = (url="") => ({
    id: Date.now(), title:"", cue:"", notes:"", summary:"",
    category:"其他", tags:[], createdAt:Date.now(), updatedAt:Date.now(),
    resourceUrl:url, platform:detectPlatform(url)
  });

  async function handleAIAnalysis() {
    if (!apiKey) { setShowApiSetup(true); return; }
    setAiLoading(true); setAiError("");
    try {
      const result = await runAIAnalysis(apiKey, {
        url: editingNote.resourceUrl,
        platform: editingNote.platform || detectPlatform(editingNote.resourceUrl),
        rawText,
        title: editingNote.title
      });
      setEditingNote(prev => ({ ...prev, cue: result.cue || prev.cue, notes: result.notes || prev.notes }));
    } catch(e) {
      setAiError(`AI 分析失敗：${e.message}`);
    }
    setAiLoading(false);
  }

  const allTags = useMemo(() => {
    const t = new Set(); notes.forEach(n => n.tags?.forEach(tag => t.add(tag))); return [...t];
  }, [notes]);

  const filteredNotes = useMemo(() => notes.filter(n => {
    const q = search.toLowerCase();
    const matchSearch = !search || [n.title,n.notes,n.cue,n.summary,n.resourceUrl].some(f=>f?.toLowerCase().includes(q));
    const matchCat = filterCat==="全部" || n.category===filterCat;
    const matchTag = !filterTag || n.tags?.includes(filterTag);
    const matchType = filterType==="全部" || (filterType==="資源" ? !!n.resourceUrl : !n.resourceUrl);
    return matchSearch && matchCat && matchTag && matchType;
  }), [notes,search,filterCat,filterTag,filterType]);

  function handleQuickCapture(e) {
    if (e.key==="Enter" && quickCapture.trim()) {
      const n = blankNote(); n.title=quickCapture.trim(); saveNote(n); setQuickCapture("");
    }
  }
  function handleQuickUrl(e) {
    if (e.key==="Enter" && quickUrl.trim()) {
      const n = blankNote(quickUrl.trim());
      n.title = `${PLATFORM_META[detectPlatform(quickUrl)]?.label||"資源"} 筆記`;
      setEditingNote(n); setRawText(""); setShowRawText(false); setQuickUrl(""); setView("editor");
    }
  }

  const weeklyData = useMemo(() => {
    const map = {};
    notes.forEach(n=>{const w=getWeekKey(n.createdAt);map[w]=(map[w]||0)+1;});
    return Object.entries(map).slice(-6).map(([week,count])=>({week,count}));
  }, [notes]);
  const catData = useMemo(()=>{
    const map={};notes.forEach(n=>{map[n.category||"其他"]=(map[n.category||"其他"]||0)+1;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[notes]);
  const maxWeekly = Math.max(...weeklyData.map(d=>d.count),1);
  const resourceCount = notes.filter(n=>n.resourceUrl).length;
  const streak = useMemo(()=>{
    if(!notes.length)return 0;
    const days=new Set(notes.map(n=>new Date(n.createdAt).toDateString()));
    let s=0,d=new Date();while(days.has(d.toDateString())){s++;d.setDate(d.getDate()-1);}return s;
  },[notes]);

  const goEdit = (n) => {
    setEditingNote({...n}); setRawText(""); setShowRawText(false); setAiError(""); setView("editor");
  };
  const nav = [{id:"dashboard",label:"主頁"},{id:"library",label:"資料庫"},{id:"analytics",label:"分析"}];

  if (user === undefined) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div className="spinner" style={{width:32,height:32}} /></div>;
  if (!user) return <LoginScreen />;
  if (showApiSetup) return <ApiKeySetup onSave={k=>{if(k){setApiKey(k);}setShowApiSetup(false);}} />;

  return (
    <div style={{fontFamily:"inherit",minHeight:"100vh",background:"#fafafa",color:"#1a1a1a"}}>
      {/* Header */}
      <div style={{borderBottom:"1px solid #e5e5e5",background:"#fff",position:"sticky",top:0,zIndex:100}}>
        <div style={{padding:"0 20px",display:"flex",alignItems:"center",gap:12,height:52}}>
          <span style={{fontWeight:700,fontSize:15}}>Knowledge Base</span>
          <div style={{display:"flex",gap:2}}>
            {nav.map(n=>(
              <button key={n.id} onClick={()=>setView(n.id)} style={{padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:500,background:view===n.id?"#f0f0f0":"transparent",color:view===n.id?"#111":"#666"}}>{n.label}</button>
            ))}
          </div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
            <img src={user.photoURL} alt="" style={{width:28,height:28,borderRadius:"50%",border:"1px solid #e0e0e0"}} />
            <button onClick={()=>{setEditingNote(blankNote(""));setRawText("");setShowRawText(false);setAiError("");setView("editor");}} style={{padding:"6px 10px",borderRadius:7,border:"1px solid #e0e0e0",background:"#fff",color:"#333",fontSize:12,fontWeight:500,cursor:"pointer"}}>+ 筆記</button>
            <button onClick={()=>{setEditingNote(blankNote("https://"));setRawText("");setShowRawText(false);setAiError("");setView("editor");}} style={{padding:"6px 10px",borderRadius:7,border:"none",background:"#111",color:"#fff",fontSize:12,fontWeight:500,cursor:"pointer"}}>+ 資源</button>
            <button onClick={()=>setShowApiSetup(true)} title="AI 設定" style={{padding:"5px 8px",borderRadius:7,border:"1px solid #e0e0e0",background:"#fff",fontSize:14,cursor:"pointer"}}>🤖</button>
            <button onClick={handleSignOut} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #e0e0e0",background:"#fff",color:"#888",fontSize:12,cursor:"pointer"}}>登出</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"24px 16px 80px"}}>

        {/* DASHBOARD */}
        {view==="dashboard" && (
          <div>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>你好，{user.displayName?.split(" ")[0]||"Benson"}</div>
              <div style={{fontSize:13,color:"#888"}}>你共有 {notes.length} 則筆記，其中 {resourceCount} 則來自外部資源。</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[{label:"快速記錄",placeholder:"輸入標題，按 Enter…",val:quickCapture,set:setQuickCapture,onKey:handleQuickCapture},
                {label:"貼入資源連結",placeholder:"YouTube / Threads / 文章網址…",val:quickUrl,set:setQuickUrl,onKey:handleQuickUrl}].map(f=>(
                <div key={f.label} style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#999",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{f.label}</div>
                  <input value={f.val} onChange={e=>f.set(e.target.value)} onKeyDown={f.onKey} placeholder={f.placeholder} style={{width:"100%",border:"none",outline:"none",fontSize:13,background:"transparent"}} />
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:20}}>
              {[{label:"總筆記數",value:notes.length},{label:"資源筆記",value:resourceCount},{label:"連續天數",value:`${streak} 天`},{label:"最活躍類別",value:catData[0]?.[0]||"—"}].map(s=>(
                <div key={s.label} style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:18,fontWeight:700}}>{s.value}</div>
                  <div style={{fontSize:11,color:"#888",marginTop:2}}>{s.label}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:"#555"}}>最近筆記</div>
            {!notes.length && <div style={{color:"#bbb",fontSize:13,textAlign:"center",marginTop:40}}>尚無筆記。使用上方欄位開始記錄。</div>}
            {notes.slice(0,5).map(n=>{
              const platform=n.resourceUrl?(n.platform||detectPlatform(n.resourceUrl)):null;
              const meta=platform?PLATFORM_META[platform]:null;
              return (
                <div key={n.id} onClick={()=>goEdit(n)} style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:600}}>{n.title||"（未命名）"}</span>
                      <span style={{fontSize:11,background:CATEGORY_COLORS[n.category]+"18",color:CATEGORY_COLORS[n.category],borderRadius:4,padding:"2px 6px",fontWeight:600}}>{n.category}</span>
                      {meta&&<span style={{fontSize:11,background:meta.color+"18",color:meta.color,borderRadius:4,padding:"2px 6px",fontWeight:600}}>{meta.label}</span>}
                    </div>
                    <span style={{fontSize:12,color:"#aaa",marginLeft:8,whiteSpace:"nowrap"}}>{formatDate(n.updatedAt)}</span>
                  </div>
                  {n.summary&&<div style={{fontSize:12,color:"#888",marginTop:4,lineHeight:1.5}}>{n.summary.slice(0,100)}{n.summary.length>100?"…":""}</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* LIBRARY */}
        {view==="library" && (
          <div>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋筆記…"
                style={{flex:1,minWidth:120,padding:"8px 12px",borderRadius:7,border:"1px solid #e0e0e0",fontSize:13,outline:"none",background:"#fff"}} />
              {[{val:filterType,set:setFilterType,opts:["全部","筆記","資源"]},{val:filterCat,set:setFilterCat,opts:["全部",...CATEGORIES]}].map((s,i)=>(
                <select key={i} value={s.val} onChange={e=>s.set(e.target.value)} style={{padding:"8px 10px",borderRadius:7,border:"1px solid #e0e0e0",fontSize:13,background:"#fff",cursor:"pointer",outline:"none"}}>
                  {s.opts.map(o=><option key={o}>{o}</option>)}
                </select>
              ))}
            </div>
            {filteredNotes.length===0&&<div style={{color:"#bbb",fontSize:13,textAlign:"center",marginTop:60}}>找不到符合的筆記。</div>}
            {filteredNotes.map(n=>{
              const platform=n.resourceUrl?(n.platform||detectPlatform(n.resourceUrl)):null;
              const meta=platform?PLATFORM_META[platform]:null;
              const ytId=platform==="youtube"?getYouTubeId(n.resourceUrl):null;
              return (
                <div key={n.id} onClick={()=>goEdit(n)} style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,marginBottom:10,cursor:"pointer",overflow:"hidden"}}>
                  {ytId?(
                    <div style={{display:"flex"}}>
                      <img src={`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`} alt="thumb" style={{width:110,height:74,objectFit:"cover",flexShrink:0}} />
                      <div style={{padding:"10px 14px",flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                          <span style={{fontWeight:600,fontSize:13}}>{n.title||"（未命名）"}</span>
                          <span style={{fontSize:10,background:"#ff000018",color:"#ff0000",borderRadius:4,padding:"2px 6px",fontWeight:600}}>YouTube</span>
                        </div>
                        {n.summary&&<div style={{fontSize:12,color:"#888",lineHeight:1.5}}>{n.summary.slice(0,70)}…</div>}
                        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                          <a href={n.resourceUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:"#fff",background:"#ff0000",borderRadius:4,padding:"2px 8px",textDecoration:"none",fontWeight:600}}>開啟 ↗</a>
                          <span style={{fontSize:11,color:"#aaa"}}>{formatDate(n.updatedAt)}</span>
                        </div>
                      </div>
                    </div>
                  ):(
                    <div style={{padding:"12px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                            <span style={{fontWeight:600,fontSize:14}}>{n.title||"（未命名）"}</span>
                            <span style={{fontSize:11,background:CATEGORY_COLORS[n.category]+"18",color:CATEGORY_COLORS[n.category],borderRadius:4,padding:"2px 6px",fontWeight:600}}>{n.category}</span>
                            {meta&&<span style={{fontSize:11,background:meta.color+"18",color:meta.color,borderRadius:4,padding:"2px 6px",fontWeight:600}}>{meta.label}</span>}
                          </div>
                          {n.summary&&<div style={{fontSize:12,color:"#888",lineHeight:1.5}}>{n.summary.slice(0,100)}{n.summary.length>100?"…":""}</div>}
                          {n.resourceUrl&&<a href={n.resourceUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{display:"inline-block",marginTop:8,fontSize:11,color:meta?.color||"#555",background:(meta?.color||"#555")+"15",borderRadius:4,padding:"2px 8px",textDecoration:"none",fontWeight:600}}>開啟{meta?.label?" "+meta.label:"來源"} ↗</a>}
                          {n.tags?.length>0&&<div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>{n.tags.map(t=><span key={t} style={{fontSize:11,background:"#f4f4f4",borderRadius:4,padding:"2px 6px",color:"#555"}}>#{t}</span>)}</div>}
                        </div>
                        <span style={{fontSize:12,color:"#aaa",whiteSpace:"nowrap",marginLeft:10}}>{formatDate(n.updatedAt)}</span>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* EDITOR */}
        {view==="editor" && editingNote && (()=>{
          const isResource=!!editingNote.resourceUrl&&editingNote.resourceUrl.length>10;
          const platform=detectPlatform(editingNote.resourceUrl);
          const meta=platform?PLATFORM_META[platform]:null;
          return (
            <div>
              <button onClick={()=>{setView("library");setEditingNote(null);}} style={{border:"none",background:"none",fontSize:13,color:"#666",cursor:"pointer",padding:"4px 0",marginBottom:14}}>← 返回</button>
              <input value={editingNote.title} onChange={e=>setEditingNote({...editingNote,title:e.target.value})}
                placeholder="筆記標題" style={{width:"100%",fontSize:22,fontWeight:700,border:"none",outline:"none",background:"transparent",marginBottom:14,color:"#111"}} />

              {/* Resource URL */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#999",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>資源連結</div>
                <input value={editingNote.resourceUrl||""} onChange={e=>setEditingNote({...editingNote,resourceUrl:e.target.value,platform:detectPlatform(e.target.value)})}
                  placeholder="貼入 YouTube、Threads、文章網址（選填）"
                  style={{width:"100%",padding:"8px 12px",borderRadius:7,border:"1px solid #e0e0e0",fontSize:13,outline:"none",background:"#fff"}} />
              </div>
              {isResource&&(
                <div style={{marginBottom:14}}>
                  <a href={editingNote.resourceUrl} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"9px 16px",borderRadius:8,border:"1px solid #e0e0e0",background:"#fff",color:"#111",fontSize:13,fontWeight:600,textDecoration:"none"}}>
                    <span>{meta?.icon||"🔗"}</span><span>開啟{meta?.label?" "+meta.label:"原始來源"}</span><span style={{fontSize:11,color:"#aaa"}}>↗</span>
                  </a>
                </div>
              )}

              {/* Category & Tags */}
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                <select value={editingNote.category} onChange={e=>setEditingNote({...editingNote,category:e.target.value})} style={{padding:"6px 10px",borderRadius:6,border:"1px solid #e0e0e0",fontSize:12,background:"#fff",outline:"none"}}>
                  {CATEGORIES.map(c=><option key={c}>{c}</option>)}
                </select>
                <input value={editingNote.tags?.join(", ")||""} onChange={e=>setEditingNote({...editingNote,tags:e.target.value.split(",").map(t=>t.trim()).filter(Boolean)})}
                  placeholder="標籤（以逗號分隔）" style={{flex:1,padding:"6px 10px",borderRadius:6,border:"1px solid #e0e0e0",fontSize:12,outline:"none",background:"#fff"}} />
              </div>

              {/* AI Section */}
              <div style={{background:"linear-gradient(135deg,#f5f3ff,#ede9fe)",border:"1px solid #ddd6fe",borderRadius:10,padding:14,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:14}}>✨</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#5b21b6"}}>AI 自動分析</span>
                    <span style={{fontSize:11,color:"#7c3aed"}}>— 自動填入提示欄與筆記欄</span>
                  </div>
                  <button onClick={()=>setShowRawText(v=>!v)} style={{fontSize:11,color:"#7c3aed",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>
                    {showRawText?"收起文字輸入":"貼入文字內容"}
                  </button>
                </div>
                {showRawText&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,color:"#7c3aed",marginBottom:4}}>貼入文章原文、影片逐字稿或任何文字內容（最多 6000 字）</div>
                    <textarea value={rawText} onChange={e=>setRawText(e.target.value)} rows={5}
                      placeholder="將內容貼在這裡，AI 會根據這些文字自動生成提示欄與筆記欄…"
                      style={{width:"100%",padding:"10px 12px",borderRadius:7,border:"1px solid #ddd6fe",fontSize:13,outline:"none",resize:"vertical",background:"#fff",lineHeight:1.6}} />
                    <div style={{fontSize:11,color:"#999",marginTop:4,textAlign:"right"}}>{rawText.length}/6000 字</div>
                  </div>
                )}
                {aiError&&<div style={{fontSize:12,color:"#d00",marginBottom:8,padding:"6px 10px",background:"#fff5f5",borderRadius:6}}>{aiError}</div>}
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button className="ai-btn" onClick={handleAIAnalysis} disabled={aiLoading||(!editingNote.resourceUrl&&!rawText&&!editingNote.title)}>
                    {aiLoading?<><div className="btn-spinner"/><span>分析中…</span></>:<><span>🤖</span><span>AI 分析並填入</span></>}
                  </button>
                  {!apiKey&&<span style={{fontSize:11,color:"#7c3aed"}}>需先設定 API Key（點右上角 🤖）</span>}
                  {apiKey&&!aiLoading&&<span style={{fontSize:11,color:"#888"}}>需提供連結、標題或文字內容其中一項</span>}
                </div>
              </div>

              {/* Cornell Layout */}
              <div style={{border:"1px solid #e0e0e0",borderRadius:10,overflow:"hidden",background:"#fff",marginBottom:16}}>
                <div style={{background:"#f7f7f7",padding:"8px 14px",fontSize:11,fontWeight:700,color:"#999",letterSpacing:"0.06em",textTransform:"uppercase",borderBottom:"1px solid #e0e0e0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>Cornell 筆記</span>
                  <div style={{display:"flex",gap:6}}>
                    {isResource&&<span style={{background:"#111",color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:10}}>資源模式</span>}
                    <span className="ai-tag">✨ AI 輔助</span>
                  </div>
                </div>
                <div style={{display:"flex",minHeight:240}}>
                  {/* Cue */}
                  <div style={{width:"30%",borderRight:"1px solid #e0e0e0",padding:12,display:"flex",flexDirection:"column",background:"#fafafa"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase"}}>提示欄 Cue</div>
                      <span className="ai-tag" style={{fontSize:9}}>✨ AI</span>
                    </div>
                    <textarea value={editingNote.cue} onChange={e=>setEditingNote({...editingNote,cue:e.target.value})}
                      placeholder={isResource?"我帶著什麼問題來看這個？\n（按上方「AI 分析並填入」自動生成）":"關鍵問題或概念索引…\n（可用 AI 自動生成）"} style={{flex:1,border:"none",outline:"none",resize:"none",fontSize:13,lineHeight:1.6,color:"#333",background:"transparent",fontFamily:"inherit"}} />
                  </div>
                  {/* Notes */}
                  <div style={{flex:1,padding:12,display:"flex",flexDirection:"column",background:"#fafafa"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase"}}>{isResource?"學習筆記 Notes":"筆記欄 Notes"}</div>
                      <span className="ai-tag" style={{fontSize:9}}>✨ AI</span>
                    </div>
                    <textarea value={editingNote.notes} onChange={e=>setEditingNote({...editingNote,notes:e.target.value})}
                      placeholder={isResource?"我從中學到什麼？\n（按上方「AI 分析並填入」自動生成）":"記錄主要內容、論點、數據…\n（可用 AI 自動生成）"} style={{flex:1,border:"none",outline:"none",resize:"none",fontSize:13,lineHeight:1.7,color:"#333",background:"transparent",fontFamily:"inherit"}} />
                  </div>
                </div>
                {/* Summary - manual */}
                <div style={{borderTop:"2px dashed #e0e0e0",padding:12,background:isResource?"#f0f8ff":"#fffdf5"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase"}}>
                      {isResource?"見解與應用 — 這對我意味著什麼？":"摘要欄 Summary"}
                    </div>
                    <span style={{fontSize:10,background:"#f59e0b18",color:"#d97706",borderRadius:4,padding:"2px 7px",fontWeight:700}}>✍️ 手動輸出</span>
                  </div>
                  <div style={{fontSize:11,color:"#999",marginBottom:6}}>這一欄請用你自己的語言書寫，這是鞏固理解的核心步驟，AI 不代替你完成。</div>
                  <textarea value={editingNote.summary} onChange={e=>setEditingNote({...editingNote,summary:e.target.value})}
                    placeholder={isResource?"看完後，用自己的語言寫下核心見解與應用方向…":"合上筆記，用自己的語言寫下你真正理解的內容…"}
                    rows={4} style={{width:"100%",border:"none",outline:"none",resize:"vertical",fontSize:13,lineHeight:1.7,color:"#333",background:"transparent",fontFamily:"inherit"}} />
                </div>
              </div>

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>saveNote(editingNote)} disabled={saving} style={{padding:"8px 20px",borderRadius:7,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",opacity:saving?0.6:1}}>
                  {saving?"儲存中…":"儲存"}
                </button>
                {notes.find(n=>n.id===editingNote.id)&&(
                  <button onClick={()=>deleteNote(editingNote.id)} style={{padding:"8px 14px",borderRadius:7,border:"1px solid #e0e0e0",background:"#fff",color:"#d00",fontSize:13,cursor:"pointer"}}>刪除</button>
                )}
                <button onClick={()=>{setView("library");setEditingNote(null);}} style={{padding:"8px 14px",borderRadius:7,border:"1px solid #e0e0e0",background:"#fff",color:"#555",fontSize:13,cursor:"pointer",marginLeft:"auto"}}>取消</button>
              </div>
            </div>
          );
        })()}

        {/* ANALYTICS */}
        {view==="analytics" && (
          <div>
            <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>知識積累分析</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:18}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:16,color:"#555"}}>每週新增筆記數</div>
                {weeklyData.length===0?<div style={{color:"#bbb",fontSize:13}}>尚無資料</div>:(
                  <div style={{display:"flex",alignItems:"flex-end",gap:8,height:90}}>
                    {weeklyData.map(d=>(
                      <div key={d.week} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                        <div style={{fontSize:10,color:"#888"}}>{d.count}</div>
                        <div style={{width:"100%",background:"#111",borderRadius:3,height:`${(d.count/maxWeekly)*70}px`,minHeight:4}} />
                        <div style={{fontSize:9,color:"#bbb"}}>{d.week}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:18}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:14,color:"#555"}}>筆記 vs 資源</div>
                {[{label:"一般筆記",count:notes.length-resourceCount,color:"#111"},{label:"資源筆記",count:resourceCount,color:"#3b82f6"}].map(s=>(
                  <div key={s.label} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                      <span style={{fontWeight:600}}>{s.label}</span><span style={{color:"#888"}}>{s.count} 則</span>
                    </div>
                    <div style={{height:6,background:"#f0f0f0",borderRadius:3}}>
                      <div style={{height:"100%",width:notes.length?`${(s.count/notes.length)*100}%`:"0%",background:s.color,borderRadius:3}} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:18,marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:14,color:"#555"}}>類別分布</div>
              {catData.length===0?<div style={{color:"#bbb",fontSize:13}}>尚無資料</div>:catData.map(([cat,count])=>(
                <div key={cat} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                    <span style={{fontWeight:600,color:CATEGORY_COLORS[cat]}}>{cat}</span><span style={{color:"#888"}}>{count} 則</span>
                  </div>
                  <div style={{height:6,background:"#f0f0f0",borderRadius:3}}>
                    <div style={{height:"100%",width:`${(count/notes.length)*100}%`,background:CATEGORY_COLORS[cat],borderRadius:3}} />
                  </div>
                </div>
              ))}
            </div>
            {allTags.length>0&&(
              <div style={{background:"#fff",border:"1px solid #e5e5e5",borderRadius:10,padding:18}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#555"}}>標籤</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {allTags.map(t=>(
                    <span key={t} onClick={()=>{setFilterTag(t);setView("library");}} style={{fontSize:12,background:"#f4f4f4",borderRadius:6,padding:"5px 10px",color:"#444",cursor:"pointer"}}>#{t}</span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
